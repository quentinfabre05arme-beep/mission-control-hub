<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Bitcoin Orange -->
    <linearGradient id="btcOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8850f;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGrad)" stroke="#f7931a" stroke-width="8"/>
  
  <!-- Inner Ring -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#f7931a" stroke-width="2" opacity="0.5"/>
  
  <!-- Q Letter (for Quentinvest) -->
  <text x="512" y="420" font-family="Montserrat, Arial, sans-serif" font-size="280" 
        fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="-10">Q</text>
  
  <!-- Bitcoin Symbol inside Q -->
  <g transform="translate(512, 400)" filter="url(#glow)">
    <circle cx="0" cy="0" r="50" fill="url(#btcOrange)"/>
    <text x="0" y="20" font-family="serif" font-size="60" fill="#ffffff" 
          text-anchor="middle" font-weight="bold">₿</text>
  </g>
  
  <!-- Trend Arrow (up-right) -->
  <g transform="translate(600, 320)" opacity="0.9">
    <line x1="0" y1="40" x2="40" y2="0" stroke="#4caf50" stroke-width="8" stroke-linecap="round"/>
    <polyline points="25,0 40,0 40,15" fill="none" stroke="#4caf50" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Brand Name -->
  <text x="512" y="580" font-family="Montserrat, Arial, sans-serif" font-size="48" 
        fill="#ffffff" text-anchor="middle" font-weight="600" letter-spacing="8">QUENTINVEST</text>
  
  <!-- Tagline -->
  <text x="512" y="640" font-family="Montserrat, Arial, sans-serif" font-size="22" 
        fill="#f7931a" text-anchor="middle" font-weight="400" letter-spacing="4" opacity="0.9">DATA-DRIVEN DESIGNS</text>
  
  <!-- Decorative Data Points -->
  <circle cx="280" cy="512" r="6" fill="#f7931a" opacity="0.6"/>
  <circle cx="320" cy="480" r="4" fill="#f7931a" opacity="0.4"/>
  <circle cx="300" cy="550" r="5" fill="#f7931a" opacity="0.5"/>
  
  <circle cx="744" cy="512" r="6" fill="#f7931a" opacity="0.6"/>
  <circle cx="704" cy="540" r="4" fill="#f7931a" opacity="0.4"/>
  <circle cx="724" cy="474" r="5" fill="#f7931a" opacity="0.5"/>
  
  <!-- Bottom Curve Line (chart vibes) -->
  <path d="M 350 700 Q 512 750 674 700" fill="none" stroke="#f7931a" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  
</svg>