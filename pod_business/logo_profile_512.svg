<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Circle Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#f7931a" stroke-width="6"/>
  
  <!-- Q -->
  <text x="256" y="200" font-family="Montserrat, Arial, sans-serif" font-size="140" 
        fill="#ffffff" text-anchor="middle" font-weight="700">Q</text>
  
  <!-- BTC Symbol -->
  <circle cx="256" cy="180" r="25" fill="#f7931a"/>
  <text x="256" y="190" font-family="serif" font-size="28" fill="#ffffff" 
        text-anchor="middle" font-weight="bold">₿</text>
  
  <!-- Trend Up -->
  <polyline points="320,160 340,140 360,150" fill="none" stroke="#4caf50" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brand -->
  <text x="256" y="300" font-family="Montserrat, Arial, sans-serif" font-size="24" 
        fill="#ffffff" text-anchor="middle" font-weight="600">QUENTINVEST</text>
  <!-- Tagline -->
  <text x="256" y="335" font-family="Montserrat, Arial, sans-serif" font-size="12" 
        fill="#f7931a" text-anchor="middle" letter-spacing="2">DATA-DRIVEN DESIGNS</text>
</svg>